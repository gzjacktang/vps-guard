name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shell tools
        run: sudo apt-get update && sudo apt-get install --yes shellcheck shfmt

      - name: ShellCheck
        run: shellcheck vps-guard.sh install.sh lib/*.sh tests/*.sh

      - name: Formatting
        run: shfmt --diff --indent 2 --case-indent vps-guard.sh install.sh lib/*.sh tests/*.sh

      - name: Behavior tests
        run: tests/run.sh
